<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoftStock Preview Login</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #fdf7f0 0%, #f3ebe0 100%);
        color: #2f2a24;
      }

      .card {
        padding: 24px 28px;
        border-radius: 20px;
        background: rgba(255, 250, 243, 0.92);
        border: 1px solid rgba(102, 84, 70, 0.14);
        box-shadow: 0 18px 40px rgba(99, 77, 58, 0.12);
      }
    </style>
  </head>
  <body>
    <div class="card" id="status">Signing in to preview SoftStock...</div>
    <script>
      (async () => {
        const status = document.getElementById("status");
        const target = new URLSearchParams(window.location.search).get("target") || "/";

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              email: "admin@softstock.com",
              password: "Admin@123",
            }),
          });

          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload?.message || "Preview login failed.");
          }

          localStorage.setItem("softstock-session", payload.token);
          status.textContent = "Preview ready. Redirecting...";
          window.location.replace(target);
        } catch (error) {
          status.textContent = error.message;
        }
      })();
    </script>
  </body>
</html>
